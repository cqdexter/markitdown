<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>docx-preview 测试</title>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://unpkg.com/docx-preview@0.3.7/docx-preview.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #preview { width: 100%; height: 400px; border: 1px solid #ccc; overflow: auto; background: #fff; }
    .success { color: green; } .error { color: red; }
  </style>
</head>
<body>
  <h2>docx-preview 直接测试</h2>
  <p>选择一个 .docx 文件：<input type="file" id="fileInput" accept=".docx" /></p>
  <button id="btn">用 renderAsync(ArrayBuffer) 渲染</button>
  <p>状态：<span id="status">等待中</span></p>
  <div id="preview"></div>
  <script>
    const btn = document.getElementById('btn');
    const input = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      const file = input.files[0];
      if (!file) { alert('请先选择文件'); return; }

      status.textContent = '读取文件中...';
      status.className = '';
      preview.innerHTML = '';

      try {
        const arrayBuffer = await file.arrayBuffer();
        status.textContent = '调用 renderAsync(ArrayBuffer)...';
        await docx.renderAsync(arrayBuffer, preview, null, {
          inWrapper: true,
          className: "docx",
          useBase64URL: true,
        });
        status.textContent = '渲染成功！';
        status.className = 'success';
      } catch (err) {
        status.textContent = '错误: ' + err.message;
        status.className = 'error';
        console.error(err);
      }
    });
  </script>
</body>
</html>
